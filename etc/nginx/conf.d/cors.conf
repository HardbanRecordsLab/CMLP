# HRL Dynamic CORS Configuration
# Best practice: single map + single header per response
# Matches allowed origins; empty for others = no CORS header sent

map $http_origin $cors_origin {
    default "";
    "https://cmlp.hardbanrecordslab.online" $http_origin;
    "https://hardbanrecordslab.online" $http_origin;
    "https://www.hardbanrecordslab.online" $http_origin;
}

map $http_origin $is_cors {
    default 0;
    "~^https?://" 1;
}
