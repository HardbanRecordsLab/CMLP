server {
    listen 80;
    server_name api.cmlp.hardbanrecordslab.online;
    # Redirect to secure server
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.cmlp.hardbanrecordslab.online;

    ssl_certificate     /etc/letsencrypt/live/api.cmlp.hardbanrecordslab.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.cmlp.hardbanrecordslab.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 64M;

    # CORS headers (globalne dla całego servera)
    add_header Access-Control-Allow-Origin "https://cmlp.hardbanrecordslab.online https://hardbanrecordslab.online" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age "86400" always;

    # Obsługa preflight OPTIONS — ZAWSZE przed proxy_pass
    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://cmlp.hardbanrecordslab.online https://hardbanrecordslab.online";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Max-Age "86400";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Auth endpoints
    location /api/auth/ {
        # Preflight bez proxy_pass
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://cmlp.hardbanrecordslab.online https://hardbanrecordslab.online";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Max-Age "86400";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    # API endpoints
    location /api/ {
        # Preflight bez proxy_pass
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://cmlp.hardbanrecordslab.online https://hardbanrecordslab.online";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Max-Age "86400";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    location /api/health {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}
