# ============================================================
# Nginx config — hardbanrecordslab.online
# Security hardened + Performance optimized
# Updated: 2026-05-23 (v2.5 — X-Accel-Redirect + NestJS upstreams)
# NOTE: limit_req_zone directives are in /etc/nginx/conf.d/hrl-ratelimit.conf
# ============================================================

# ═══════════════════════════════════════════════════════
# UPSTREAMY — Mikroserwisy NestJS/Express na VPS
# ═══════════════════════════════════════════════════════
upstream sync_hub_backend {
    server 127.0.0.1:9108;
}
upstream course_hub_backend {
    server 127.0.0.1:9104;
}
upstream sso_access_manager {
    server 127.0.0.1:9107;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name hardbanrecordslab.online www.hardbanrecordslab.online ;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hardbanrecordslab.online www.hardbanrecordslab.online ;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/hardbanrecordslab.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hardbanrecordslab.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Upload limit
    client_max_body_size 64M;

    # ── Gzip Compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Blokuj złe boty i skanery ────────────────────────────
    if ($http_user_agent ~* (masscan|nikto|sqlmap|nmap|zgrab|python-requests|go-http-client|libwww-perl)) {
        return 403;
    }

    # ── Blokuj xmlrpc.php ────────────────────────────────────
    location = /xmlrpc.php {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Blokuj wrażliwe pliki ─────────────────────────────────
    location ~* /\.(git|env|htaccess|htpasswd|svn|DS_Store) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* wp-config\.php {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* /wp-content/uploads/.*\.php$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ═══════════════════════════════════════════════════════════
    # OCHRONA PLIKÓW AUDIO — INTERNAL LOCATION (X-Accel-Redirect)
    #
    # Dyrektywa "internal;" blokuje WSZYSTKIE bezpośrednie
    # żądania HTTP do tego location. Pliki są dostępne
    # wyłącznie przez wewnętrzne przekierowania Nginx
    # (X-Accel-Redirect), które wystawia NestJS po
    # pomyślnej autoryzacji JWT i walidacji licencji.
    #
    # Bezpośrednie próby: https://.../protected_media/... → 404
    # ═══════════════════════════════════════════════════════════
    location /protected_media/ {
        internal;  # KRYTYCZNE — blokuje dostęp z zewnątrz

        alias /var/www/uploads/secure_tracks/;

        # HTML5 Range Requests (pauzowanie, przewijanie)
        add_header Accept-Ranges "bytes" always;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Authorization" always;
        add_header Access-Control-Expose-Headers "Content-Range, Accept-Ranges, Content-Length, Content-Type" always;

        # Cache wyłączony (royalties, DRM)
        add_header Cache-Control "private, no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;

        # Bezpieczeństwo
        add_header X-Content-Type-Options "nosniff" always;

        # CORS preflight
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ═══════════════════════════════════════════════════════════
    # PROXY DO MIKROSERWISÓW NESTJS
    # ═══════════════════════════════════════════════════════════

    # Sync Hub (CMLP) — port 9108
    location /v3/sync/ {
        proxy_pass http://sync_hub_backend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # Course Hub Auth (Academy) — /api/ → port 9104
    location /api/ {
        proxy_pass http://course_hub_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }


    # Course Hub (Academy) — port 9104
    location /v3/academy/ {
        proxy_pass http://course_hub_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Access Manager (SSO) — port 9107
    location /v3/auth/ {
        proxy_pass http://sso_access_manager/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Cache statycznych plików (CSS, JS, obrazy, fonty) ────
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot|otf|mp4|pdf)$ {
        proxy_pass             http://localhost:3006;
        proxy_set_header Host  $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache w przeglądarce przez 1 rok
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        access_log off;
        expires 1y;
    }

    # ── Rate limit na wp-login.php ────────────────────────────
    location = /wp-login.php {
        limit_req zone=wp_login burst=10 nodelay;

        proxy_pass             http://localhost:3006;
        proxy_set_header Host  $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache_bypass 1;
        proxy_no_cache 1;
    }

    # ── Rate limit na REST API ────────────────────────────────
    location ~* ^/wp-json/ {
        limit_req zone=wp_api burst=30 nodelay;

        proxy_pass             http://localhost:3006;
        proxy_set_header Host  $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache_bypass 1;
        proxy_no_cache 1;
    }


    # ── Główny proxy do WordPress (HTML) ─────────────────────
    location / {
        proxy_pass             http://localhost:3006;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HTML nie cachujemy — WordPress generuje dynamicznie
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        proxy_cache_bypass 1;
        proxy_no_cache 1;
    }
}# ============================================================
# cmlp.hardbanrecordslab.online (CMLP Sync Hub — proxy przez WP)
# ============================================================
server {
    listen 443 ssl http2;
    server_name cmlp.hardbanrecordslab.online;

    ssl_certificate     /etc/letsencrypt/live/cmlp.hardbanrecordslab.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cmlp.hardbanrecordslab.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 550M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Auth + API endpoints → CMLP backend app (port 3000)
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    # Sync endpoints → Sync Hub backend (port 9108)
    location /v3/sync/ {
        proxy_pass http://sync_hub_backend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # Everything else (static SPA files from build) — serve directly or fallback
    # If frontend build is present locally, serve it; otherwise proxy to Vercel-build artifacts if mounted
    location / {
        # Try serving static files from common SPA build dirs
        root /var/www/cmlp-frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

# ============================================================
# course-hub.hardbanrecordslab.online (Academy API — port 9104)
# ============================================================
server {
    listen 443 ssl http2;
    server_name course-hub.hardbanrecordslab.online;

    ssl_certificate     /etc/letsencrypt/live/course-hub.hardbanrecordslab.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/course-hub.hardbanrecordslab.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://course_hub_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ============================================================
# hrl-access.hardbanrecordslab.online (SSO — port 9107)
# ============================================================
server {
    listen 443 ssl http2;
    server_name hrl-access.hardbanrecordslab.online;

    ssl_certificate     /etc/letsencrypt/live/hrl-access.hardbanrecordslab.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hrl-access.hardbanrecordslab.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://sso_access_manager;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
