<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8A96E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8D5A3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6914;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="120" fill="#000000" rx="8"/>
  
  <!-- Decorative line -->
  <line x1="20" y1="85" x2="380" y2="85" stroke="url(#goldGradient)" stroke-width="1" opacity="0.3"/>
  
  <!-- Musical note icon -->
  <g transform="translate(25, 20)" filter="url(#glow)">
    <path d="M15 35 L15 15 L35 10 L35 30 L15 35Z" fill="url(#goldGradient)"/>
    <rect x="13" y="35" width="4" height="25" rx="2" fill="url(#goldGradient)"/>
    <rect x="33" y="30" width="4" height="25" rx="2" fill="url(#goldGradient)"/>
    <ellipse cx="15" cy="62" rx="8" ry="5" fill="url(#goldGradient)" opacity="0.8"/>
    <ellipse cx="35" cy="57" rx="8" ry="5" fill="url(#goldGradient)" opacity="0.8"/>
  </g>
  
  <!-- Main title -->
  <text x="200" y="45" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="700" fill="url(#goldGradient)" filter="url(#glow)">
    Muzyczna Kreacja Słów
  </text>
  
  <!-- Subtitle -->
  <text x="200" y="70" text-anchor="middle" font-family="'DM Sans', 'Inter', sans-serif" font-size="11" font-weight="500" letter-spacing="3" fill="#C8A96E" opacity="0.9">
    SPERSONALIZOWANE UTWORY NA ZAMÓWIENIE
  </text>
  
  <!-- Tagline -->
  <text x="200" y="95" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#E8D5A3" opacity="0.85">
    Tworzymy muzykę, która opowiada Twoją historię
  </text>
</svg>
