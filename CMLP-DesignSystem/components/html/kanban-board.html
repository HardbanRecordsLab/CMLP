<!-- Kanban Board Component -->
<div x-data="kanbanBoard()" 
     x-init="init()"
     class="kanban-board-wrapper">
  
  <!-- Board Header -->
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-2xl font-bold text-base-content">Kanban Board</h2>
    <div class="flex gap-2">
      <button @click="addColumn()" class="btn btn-primary btn-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
        </svg>
        Add Column
      </button>
      <button @click="exportBoard()" class="btn btn-ghost btn-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
        </svg>
        Export
      </button>
    </div>
  </div>

  <!-- Board Container -->
  <div class="kanban-board">
    <template x-for="(column, columnIndex) in columns" :key="column.id">
      <div class="kanban-column" 
           :data-column-id="column.id"
           x-ref="'column-' + column.id">
        
        <!-- Column Header -->
        <div class="kanban-column-header">
          <div class="flex items-center gap-2">
            <input 
              type="text" 
              x-model="column.title"
              @change="saveBoard()"
              class="input input-ghost input-sm font-semibold w-32"
              :aria-label="'Column ' + (columnIndex + 1) + ' title'">
            <span class="kanban-column-count badge badge-ghost badge-sm" x-text="column.cards.length"></span>
          </div>
          <div class="dropdown dropdown-end">
            <label tabindex="0" class="btn btn-ghost btn-xs btn-circle">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"></path>
              </svg>
            </label>
            <ul tabindex="0" class="dropdown-content z-[1] menu p-2 shadow bg-base-100 rounded-box w-52">
              <li><a @click="addCard(column.id)">Add Card</a></li>
              <li><a @click="renameColumn(column.id)">Rename Column</a></li>
              <li><a @click="clearColumn(column.id)" class="text-warning">Clear Cards</a></li>
              <li><a @click="deleteColumn(column.id)" class="text-error">Delete Column</a></li>
            </ul>
          </div>
        </div>

        <!-- Cards Container -->
        <div class="kanban-cards-container space-y-3 min-h-[200px]"
             :data-column-id="column.id"
             x-ref="'cards-' + column.id">
          
          <template x-for="(card, cardIndex) in column.cards" :key="card.id">
            <div class="kanban-card"
                 :data-card-id="card.id"
                 @click="editCard(column.id, card.id)">
              
              <!-- Card Header -->
              <div class="flex items-start justify-between mb-2">
                <h3 class="kanban-card-title flex-1" x-text="card.title"></h3>
                <div class="dropdown dropdown-end">
                  <label tabindex="0" class="btn btn-ghost btn-xs btn-circle">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"></path>
                    </svg>
                  </label>
                  <ul tabindex="0" class="dropdown-content z-[1] menu p-2 shadow bg-base-100 rounded-box w-40">
                    <li><a @click.stop="editCard(column.id, card.id)">Edit</a></li>
                    <li><a @click.stop="duplicateCard(column.id, card.id)">Duplicate</a></li>
                    <li><a @click.stop="deleteCard(column.id, card.id)" class="text-error">Delete</a></li>
                  </ul>
                </div>
              </div>

              <!-- Card Description -->
              <p x-show="card.description" class="kanban-card-description" x-text="card.description"></p>

              <!-- Card Footer -->
              <div class="flex items-center justify-between mt-3 pt-3 border-t border-base-300">
                <div class="flex items-center gap-2">
                  <!-- Priority Badge -->
                  <span x-show="card.priority" 
                        class="badge badge-sm"
                        :class="{
                          'badge-error': card.priority === 'high',
                          'badge-warning': card.priority === 'medium',
                          'badge-info': card.priority === 'low'
                        }"
                        x-text="card.priority"></span>
                  
                  <!-- Labels -->
                  <template x-for="label in card.labels" :key="label">
                    <span class="badge badge-ghost badge-sm" x-text="label"></span>
                  </template>
                </div>
                
                <!-- Due Date -->
                <span x-show="card.dueDate" class="text-xs text-base-content/60" x-text="formatDate(card.dueDate)"></span>
              </div>
            </div>
          </template>
        </div>

        <!-- Add Card Button -->
        <button @click="addCard(column.id)" 
                class="btn btn-ghost btn-sm w-full mt-3 text-base-content/60 hover:text-base-content">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
          </svg>
          Add Card
        </button>
      </div>
    </template>
  </div>

  <!-- Card Modal -->
  <div x-show="showCardModal" 
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       @click.self="closeCardModal()"
       class="modal modal-open">
    <div class="modal-box w-11/12 max-w-2xl">
      <h3 class="font-bold text-lg mb-4" x-text="editingCard ? 'Edit Card' : 'New Card'"></h3>
      
      <form @submit.prevent="saveCard()">
        <!-- Title -->
        <div class="form-control mb-4">
          <label class="label">
            <span class="label-text">Title</span>
          </label>
          <input type="text" 
                 x-model="cardForm.title"
                 class="input input-bordered"
                 required
                 placeholder="Card title">
        </div>

        <!-- Description -->
        <div class="form-control mb-4">
          <label class="label">
            <span class="label-text">Description</span>
          </label>
          <textarea x-model="cardForm.description"
                    class="textarea textarea-bordered"
                    rows="4"
                    placeholder="Card description"></textarea>
        </div>

        <!-- Priority -->
        <div class="form-control mb-4">
          <label class="label">
            <span class="label-text">Priority</span>
          </label>
          <select x-model="cardForm.priority" class="select select-bordered">
            <option value="">None</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>

        <!-- Labels -->
        <div class="form-control mb-4">
          <label class="label">
            <span class="label-text">Labels (comma-separated)</span>
          </label>
          <input type="text" 
                 x-model="cardForm.labelsText"
                 class="input input-bordered"
                 placeholder="bug, feature, urgent">
        </div>

        <!-- Due Date -->
        <div class="form-control mb-4">
          <label class="label">
            <span class="label-text">Due Date</span>
          </label>
          <input type="date" 
                 x-model="cardForm.dueDate"
                 class="input input-bordered">
        </div>

        <!-- Actions -->
        <div class="modal-action">
          <button type="button" @click="closeCardModal()" class="btn btn-ghost">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Card</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
function kanbanBoard() {
  return {
    columns: [],
    showCardModal: false,
    editingCard: null,
    currentColumnId: null,
    currentCardId: null,
    cardForm: {
      title: '',
      description: '',
      priority: '',
      labelsText: '',
      dueDate: ''
    },
    sortableInstances: [],

    init() {
      this.loadBoard();
      this.$nextTick(() => {
        this.initSortable();
      });
    },

    loadBoard() {
      const saved = localStorage.getItem('kanban-board');
      if (saved) {
        this.columns = JSON.parse(saved);
      } else {
        // Default columns
        this.columns = [
          {
            id: this.generateId(),
            title: 'To Do',
            cards: [
              {
                id: this.generateId(),
                title: 'Sample Task 1',
                description: 'This is a sample task',
                priority: 'medium',
                labels: ['feature'],
                dueDate: ''
              }
            ]
          },
          {
            id: this.generateId(),
            title: 'In Progress',
            cards: []
          },
          {
            id: this.generateId(),
            title: 'Done',
            cards: []
          }
        ];
        this.saveBoard();
      }
    },

    saveBoard() {
      localStorage.setItem('kanban-board', JSON.stringify(this.columns));
    },

    generateId() {
      return 'id-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
    },

    initSortable() {
      // Initialize SortableJS for each column
      this.columns.forEach(column => {
        const container = this.$refs['cards-' + column.id];
        if (container && !container._sortable) {
          const sortable = Sortable.create(container, {
            group: 'kanban',
            animation: 150,
            ghostClass: 'opacity-30',
            dragClass: 'shadow-lg',
            onEnd: (evt) => {
              this.handleDragEnd(evt);
            }
          });
          container._sortable = sortable;
          this.sortableInstances.push(sortable);
        }
      });
    },

    handleDragEnd(evt) {
      const fromColumnId = evt.from.dataset.columnId;
      const toColumnId = evt.to.dataset.columnId;
      const oldIndex = evt.oldIndex;
      const newIndex = evt.newIndex;

      // Find columns
      const fromColumn = this.columns.find(c => c.id === fromColumnId);
      const toColumn = this.columns.find(c => c.id === toColumnId);

      if (!fromColumn || !toColumn) return;

      // Move card
      const [card] = fromColumn.cards.splice(oldIndex, 1);
      toColumn.cards.splice(newIndex, 0, card);

      this.saveBoard();
    },

    addColumn() {
      const title = prompt('Column title:');
      if (title) {
        this.columns.push({
          id: this.generateId(),
          title: title,
          cards: []
        });
        this.saveBoard();
        this.$nextTick(() => {
          this.initSortable();
        });
      }
    },

    renameColumn(columnId) {
      const column = this.columns.find(c => c.id === columnId);
      if (column) {
        const newTitle = prompt('New column title:', column.title);
        if (newTitle) {
          column.title = newTitle;
          this.saveBoard();
        }
      }
    },

    deleteColumn(columnId) {
      if (confirm('Delete this column and all its cards?')) {
        this.columns = this.columns.filter(c => c.id !== columnId);
        this.saveBoard();
      }
    },

    clearColumn(columnId) {
      if (confirm('Clear all cards from this column?')) {
        const column = this.columns.find(c => c.id === columnId);
        if (column) {
          column.cards = [];
          this.saveBoard();
        }
      }
    },

    addCard(columnId) {
      this.currentColumnId = columnId;
      this.editingCard = false;
      this.cardForm = {
        title: '',
        description: '',
        priority: '',
        labelsText: '',
        dueDate: ''
      };
      this.showCardModal = true;
    },

    editCard(columnId, cardId) {
      const column = this.columns.find(c => c.id === columnId);
      if (!column) return;

      const card = column.cards.find(c => c.id === cardId);
      if (!card) return;

      this.currentColumnId = columnId;
      this.currentCardId = cardId;
      this.editingCard = true;
      this.cardForm = {
        title: card.title,
        description: card.description || '',
        priority: card.priority || '',
        labelsText: card.labels ? card.labels.join(', ') : '',
        dueDate: card.dueDate || ''
      };
      this.showCardModal = true;
    },

    saveCard() {
      const labels = this.cardForm.labelsText
        ? this.cardForm.labelsText.split(',').map(l => l.trim()).filter(l => l)
        : [];

      if (this.editingCard) {
        // Update existing card
        const column = this.columns.find(c => c.id === this.currentColumnId);
        if (column) {
          const card = column.cards.find(c => c.id === this.currentCardId);
          if (card) {
            card.title = this.cardForm.title;
            card.description = this.cardForm.description;
            card.priority = this.cardForm.priority;
            card.labels = labels;
            card.dueDate = this.cardForm.dueDate;
          }
        }
      } else {
        // Create new card
        const column = this.columns.find(c => c.id === this.currentColumnId);
        if (column) {
          column.cards.push({
            id: this.generateId(),
            title: this.cardForm.title,
            description: this.cardForm.description,
            priority: this.cardForm.priority,
            labels: labels,
            dueDate: this.cardForm.dueDate
          });
        }
      }

      this.saveBoard();
      this.closeCardModal();
    },

    duplicateCard(columnId, cardId) {
      const column = this.columns.find(c => c.id === columnId);
      if (!column) return;

      const card = column.cards.find(c => c.id === cardId);
      if (!card) return;

      column.cards.push({
        ...card,
        id: this.generateId(),
        title: card.title + ' (copy)'
      });

      this.saveBoard();
    },

    deleteCard(columnId, cardId) {
      if (confirm('Delete this card?')) {
        const column = this.columns.find(c => c.id === columnId);
        if (column) {
          column.cards = column.cards.filter(c => c.id !== cardId);
          this.saveBoard();
        }
      }
    },

    closeCardModal() {
      this.showCardModal = false;
      this.editingCard = null;
      this.currentColumnId = null;
      this.currentCardId = null;
    },

    formatDate(dateString) {
      if (!dateString) return '';
      const date = new Date(dateString);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    },

    exportBoard() {
      const data = JSON.stringify(this.columns, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'kanban-board.json';
      a.click();
      URL.revokeObjectURL(url);
    }
  }
}
</script>
