<!-- Schema/JSON Form Builder Component -->
<div x-data="formBuilder()" 
     x-init="init()"
     class="form-builder-wrapper">
  
  <!-- Form Header -->
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-2xl font-bold text-base-content" x-text="formTitle"></h2>
    <div class="flex gap-2">
      <button @click="showSchemaEditor = !showSchemaEditor" class="btn btn-ghost btn-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
        </svg>
        Edit Schema
      </button>
      <button @click="resetForm()" class="btn btn-ghost btn-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
        </svg>
        Reset
      </button>
    </div>
  </div>

  <!-- Schema Editor Modal -->
  <div x-show="showSchemaEditor" 
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       @click.self="showSchemaEditor = false"
       class="modal modal-open">
    <div class="modal-box w-11/12 max-w-4xl h-[80vh] flex flex-col">
      <h3 class="font-bold text-lg mb-4">JSON Schema Editor</h3>
      
      <div class="flex-1 flex gap-4 overflow-hidden">
        <!-- Schema Input -->
        <div class="flex-1 flex flex-col">
          <label class="label">
            <span class="label-text">Schema JSON</span>
          </label>
          <textarea 
            x-model="schemaText"
            @input="validateSchema()"
            class="textarea textarea-bordered flex-1 font-mono text-sm"
            placeholder="Paste your JSON schema here..."></textarea>
          <div x-show="schemaError" class="text-error text-sm mt-2" x-text="schemaError"></div>
        </div>

        <!-- Preview -->
        <div class="flex-1 flex flex-col">
          <label class="label">
            <span class="label-text">Preview</span>
          </label>
          <div class="bg-base-200 rounded-lg p-4 flex-1 overflow-auto">
            <pre class="text-xs font-mono" x-text="schemaText"></pre>
          </div>
        </div>
      </div>

      <div class="modal-action">
        <button @click="showSchemaEditor = false" class="btn btn-ghost">Cancel</button>
        <button @click="applySchema()" class="btn btn-primary" :disabled="!isSchemaValid">Apply Schema</button>
      </div>
    </div>
  </div>

  <!-- Form Container -->
  <div class="card bg-base-100 shadow-xl">
    <div class="card-body">
      <form @submit.prevent="submitForm()" class="space-y-6">
        
        <!-- Render Fields -->
        <template x-for="field in visibleFields" :key="field.name">
          <div class="form-builder-field" x-show="isFieldVisible(field)">
            
            <!-- Text Input -->
            <template x-if="field.type === 'text' || field.type === 'email' || field.type === 'password' || field.type === 'url' || field.type === 'tel' || field.type === 'number'">
              <div class="form-control">
                <label class="label" :for="field.name">
                  <span class="label-text" x-text="field.label"></span>
                  <span x-show="field.required" class="label-text-alt text-error">*</span>
                </label>
                <input 
                  :type="field.type"
                  :id="field.name"
                  :name="field.name"
                  x-model="formData[field.name]"
                  :required="field.required"
                  :placeholder="field.placeholder || ''"
                  :min="field.min"
                  :max="field.max"
                  :step="field.step"
                  :pattern="field.pattern"
                  class="form-builder-input"
                  :class="{ 'input-error': errors[field.name] }"
                  :aria-describedby="errors[field.name] ? field.name + '-error' : null">
                <label x-show="errors[field.name]" :id="field.name + '-error'" class="label">
                  <span class="label-text-alt text-error" x-text="errors[field.name]"></span>
                </label>
                <label x-show="field.helpText && !errors[field.name]" class="label">
                  <span class="label-text-alt" x-text="field.helpText"></span>
                </label>
              </div>
            </template>

            <!-- Textarea -->
            <template x-if="field.type === 'textarea'">
              <div class="form-control">
                <label class="label" :for="field.name">
                  <span class="label-text" x-text="field.label"></span>
                  <span x-show="field.required" class="label-text-alt text-error">*</span>
                </label>
                <textarea 
                  :id="field.name"
                  :name="field.name"
                  x-model="formData[field.name]"
                  :required="field.required"
                  :placeholder="field.placeholder || ''"
                  :rows="field.rows || 4"
                  class="form-builder-textarea"
                  :class="{ 'textarea-error': errors[field.name] }"
                  :aria-describedby="errors[field.name] ? field.name + '-error' : null"></textarea>
                <label x-show="errors[field.name]" :id="field.name + '-error'" class="label">
                  <span class="label-text-alt text-error" x-text="errors[field.name]"></span>
                </label>
              </div>
            </template>

            <!-- Select -->
            <template x-if="field.type === 'select'">
              <div class="form-control">
                <label class="label" :for="field.name">
                  <span class="label-text" x-text="field.label"></span>
                  <span x-show="field.required" class="label-text-alt text-error">*</span>
                </label>
                <select 
                  :id="field.name"
                  :name="field.name"
                  x-model="formData[field.name]"
                  :required="field.required"
                  class="form-builder-select"
                  :class="{ 'select-error': errors[field.name] }"
                  :aria-describedby="errors[field.name] ? field.name + '-error' : null">
                  <option value="" x-text="field.placeholder || 'Select an option'"></option>
                  <template x-for="option in field.options" :key="option.value">
                    <option :value="option.value" x-text="option.label"></option>
                  </template>
                </select>
                <label x-show="errors[field.name]" :id="field.name + '-error'" class="label">
                  <span class="label-text-alt text-error" x-text="errors[field.name]"></span>
                </label>
              </div>
            </template>

            <!-- Radio Group -->
            <template x-if="field.type === 'radio'">
              <div class="form-control">
                <label class="label">
                  <span class="label-text" x-text="field.label"></span>
                  <span x-show="field.required" class="label-text-alt text-error">*</span>
                </label>
                <div class="space-y-2">
                  <template x-for="option in field.options" :key="option.value">
                    <label class="label cursor-pointer justify-start gap-3">
                      <input 
                        type="radio"
                        :name="field.name"
                        :value="option.value"
                        x-model="formData[field.name]"
                        :required="field.required"
                        class="radio radio-primary">
                      <span class="label-text" x-text="option.label"></span>
                    </label>
                  </template>
                </div>
                <label x-show="errors[field.name]" class="label">
                  <span class="label-text-alt text-error" x-text="errors[field.name]"></span>
                </label>
              </div>
            </template>

            <!-- Checkbox Group -->
            <template x-if="field.type === 'checkbox-group'">
              <div class="form-control">
                <label class="label">
                  <span class="label-text" x-text="field.label"></span>
                  <span x-show="field.required" class="label-text-alt text-error">*</span>
                </label>
                <div class="space-y-2">
                  <template x-for="option in field.options" :key="option.value">
                    <label class="label cursor-pointer justify-start gap-3">
                      <input 
                        type="checkbox"
                        :name="field.name"
                        :value="option.value"
                        x-model="formData[field.name]"
                        class="checkbox checkbox-primary">
                      <span class="label-text" x-text="option.label"></span>
                    </label>
                  </template>
                </div>
                <label x-show="errors[field.name]" class="label">
                  <span class="label-text-alt text-error" x-text="errors[field.name]"></span>
                </label>
              </div>
            </template>

            <!-- Single Checkbox -->
            <template x-if="field.type === 'checkbox'">
              <div class="form-control">
                <label class="label cursor-pointer justify-start gap-3">
                  <input 
                    type="checkbox"
                    :name="field.name"
                    x-model="formData[field.name]"
                    :required="field.required"
                    class="checkbox checkbox-primary">
                  <span class="label-text" x-text="field.label"></span>
                </label>
                <label x-show="errors[field.name]" class="label">
                  <span class="label-text-alt text-error" x-text="errors[field.name]"></span>
                </label>
              </div>
            </template>

            <!-- Date Input -->
            <template x-if="field.type === 'date'">
              <div class="form-control">
                <label class="label" :for="field.name">
                  <span class="label-text" x-text="field.label"></span>
                  <span x-show="field.required" class="label-text-alt text-error">*</span>
                </label>
                <input 
                  type="date"
                  :id="field.name"
                  :name="field.name"
                  x-model="formData[field.name]"
                  :required="field.required"
                  :min="field.min"
                  :max="field.max"
                  class="form-builder-input"
                  :class="{ 'input-error': errors[field.name] }">
                <label x-show="errors[field.name]" class="label">
                  <span class="label-text-alt text-error" x-text="errors[field.name]"></span>
                </label>
              </div>
            </template>

            <!-- File Upload -->
            <template x-if="field.type === 'file'">
              <div class="form-control">
                <label class="label" :for="field.name">
                  <span class="label-text" x-text="field.label"></span>
                  <span x-show="field.required" class="label-text-alt text-error">*</span>
                </label>
                <input 
                  type="file"
                  :id="field.name"
                  :name="field.name"
                  @change="handleFileUpload(field.name, $event)"
                  :required="field.required"
                  :accept="field.accept || ''"
                  :multiple="field.multiple || false"
                  class="file-input file-input-bordered w-full"
                  :class="{ 'file-input-error': errors[field.name] }">
                <label x-show="errors[field.name]" class="label">
                  <span class="label-text-alt text-error" x-text="errors[field.name]"></span>
                </label>
              </div>
            </template>

            <!-- Hidden Field -->
            <template x-if="field.type === 'hidden'">
              <input type="hidden" :name="field.name" x-model="formData[field.name]">
            </template>

          </div>
        </template>

        <!-- Submit Button -->
        <div class="form-control mt-6">
          <button type="submit" class="btn btn-primary" :disabled="isSubmitting">
            <span x-show="!isSubmitting" x-text="submitText"></span>
            <span x-show="isSubmitting" class="loading loading-spinner"></span>
            <span x-show="isSubmitting">Submitting...</span>
          </button>
        </div>

        <!-- Success Message -->
        <div x-show="submitSuccess" class="alert alert-success">
          <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span x-text="successMessage"></span>
        </div>

      </form>
    </div>
  </div>
</div>

<script>
function formBuilder() {
  return {
    formTitle: 'Dynamic Form',
    schema: null,
    schemaText: '',
    schemaError: '',
    isSchemaValid: false,
    formData: {},
    errors: {},
    showSchemaEditor: false,
    isSubmitting: false,
    submitSuccess: false,
    successMessage: 'Form submitted successfully!',
    submitText: 'Submit',
    
    // Default schema for demonstration
    defaultSchema: {
      title: 'Contact Form',
      submitText: 'Send Message',
      fields: [
        {
          name: 'name',
          type: 'text',
          label: 'Full Name',
          required: true,
          placeholder: 'John Doe',
          helpText: 'Enter your full name'
        },
        {
          name: 'email',
          type: 'email',
          label: 'Email Address',
          required: true,
          placeholder: 'john@example.com'
        },
        {
          name: 'subject',
          type: 'select',
          label: 'Subject',
          required: true,
          options: [
            { value: 'general', label: 'General Inquiry' },
            { value: 'support', label: 'Technical Support' },
            { value: 'billing', label: 'Billing Question' },
            { value: 'other', label: 'Other' }
          ]
        },
        {
          name: 'priority',
          type: 'radio',
          label: 'Priority Level',
          required: true,
          options: [
            { value: 'low', label: 'Low' },
            { value: 'medium', label: 'Medium' },
            { value: 'high', label: 'High' }
          ]
        },
        {
          name: 'message',
          type: 'textarea',
          label: 'Message',
          required: true,
          placeholder: 'Type your message here...',
          rows: 5
        },
        {
          name: 'newsletter',
          type: 'checkbox',
          label: 'Subscribe to newsletter'
        },
        {
          name: 'terms',
          type: 'checkbox',
          label: 'I agree to the terms and conditions',
          required: true
        }
      ],
      conditionalFields: [
        {
          field: 'subject',
          value: 'support',
          show: ['priority']
        }
      ]
    },

    init() {
      this.schema = this.defaultSchema;
      this.schemaText = JSON.stringify(this.defaultSchema, null, 2);
      this.formTitle = this.schema.title || 'Dynamic Form';
      this.submitText = this.schema.submitText || 'Submit';
      this.initializeFormData();
    },

    initializeFormData() {
      this.formData = {};
      this.schema.fields.forEach(field => {
        if (field.type === 'checkbox-group') {
          this.formData[field.name] = [];
        } else if (field.type === 'checkbox') {
          this.formData[field.name] = false;
        } else {
          this.formData[field.name] = field.defaultValue || '';
        }
      });
    },

    validateSchema() {
      try {
        const parsed = JSON.parse(this.schemaText);
        if (!parsed.fields || !Array.isArray(parsed.fields)) {
          this.schemaError = 'Schema must have a "fields" array';
          this.isSchemaValid = false;
          return;
        }
        
        // Validate each field
        for (const field of parsed.fields) {
          if (!field.name || !field.type || !field.label) {
            this.schemaError = 'Each field must have name, type, and label';
            this.isSchemaValid = false;
            return;
          }
        }
        
        this.schemaError = '';
        this.isSchemaValid = true;
      } catch (e) {
        this.schemaError = 'Invalid JSON: ' + e.message;
        this.isSchemaValid = false;
      }
    },

    applySchema() {
      try {
        this.schema = JSON.parse(this.schemaText);
        this.formTitle = this.schema.title || 'Dynamic Form';
        this.submitText = this.schema.submitText || 'Submit';
        this.initializeFormData();
        this.errors = {};
        this.showSchemaEditor = false;
      } catch (e) {
        this.schemaError = 'Failed to apply schema: ' + e.message;
      }
    },

    get visibleFields() {
      return this.schema.fields.filter(field => this.isFieldVisible(field));
    },

    isFieldVisible(field) {
      if (!field.visibleIf) return true;
      
      const condition = field.visibleIf;
      const fieldValue = this.formData[condition.field];
      
      switch (condition.operator) {
        case 'equals':
          return fieldValue === condition.value;
        case 'notEquals':
          return fieldValue !== condition.value;
        case 'contains':
          return Array.isArray(fieldValue) && fieldValue.includes(condition.value);
        case 'notEmpty':
          return fieldValue && fieldValue.length > 0;
        default:
          return true;
      }
    },

    validateField(field) {
      const value = this.formData[field.name];
      
      // Required validation
      if (field.required) {
        if (field.type === 'checkbox' && !value) {
          return 'This field is required';
        }
        if (field.type !== 'checkbox' && (!value || value === '')) {
          return 'This field is required';
        }
      }
      
      // Type-specific validation
      if (value && value !== '') {
        switch (field.type) {
          case 'email':
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) {
              return 'Please enter a valid email address';
            }
            break;
          case 'url':
            try {
              new URL(value);
            } catch {
              return 'Please enter a valid URL';
            }
            break;
          case 'number':
            if (isNaN(value)) {
              return 'Please enter a valid number';
            }
            if (field.min !== undefined && Number(value) < field.min) {
              return `Value must be at least ${field.min}`;
            }
            if (field.max !== undefined && Number(value) > field.max) {
              return `Value must be at most ${field.max}`;
            }
            break;
          case 'tel':
            if (!/^[\d\s\-\+\(\)]+$/.test(value)) {
              return 'Please enter a valid phone number';
            }
            break;
        }
        
        // Pattern validation
        if (field.pattern) {
          const regex = new RegExp(field.pattern);
          if (!regex.test(value)) {
            return field.patternMessage || 'Invalid format';
          }
        }
      }
      
      return null;
    },

    validateForm() {
      this.errors = {};
      let isValid = true;
      
      this.schema.fields.forEach(field => {
        if (this.isFieldVisible(field)) {
          const error = this.validateField(field);
          if (error) {
            this.errors[field.name] = error;
            isValid = false;
          }
        }
      });
      
      return isValid;
    },

    handleFileUpload(fieldName, event) {
      const files = event.target.files;
      if (files.length > 0) {
        this.formData[fieldName] = files.length === 1 ? files[0] : Array.from(files);
      }
    },

    async submitForm() {
      if (!this.validateForm()) {
        // Scroll to first error
        const firstErrorField = Object.keys(this.errors)[0];
        if (firstErrorField) {
          const element = document.getElementById(firstErrorField);
          if (element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'center' });
            element.focus();
          }
        }
        return;
      }
      
      this.isSubmitting = true;
      this.submitSuccess = false;
      
      try {
        // Simulate form submission
        await new Promise(resolve => setTimeout(resolve, 1500));
        
        // Call custom submit handler if provided
        if (this.schema.onSubmit) {
          await this.schema.onSubmit(this.formData);
        } else {
          console.log('Form submitted:', this.formData);
        }
        
        this.submitSuccess = true;
        this.successMessage = this.schema.successMessage || 'Form submitted successfully!';
        
        // Reset form after success
        setTimeout(() => {
          this.resetForm();
          this.submitSuccess = false;
        }, 3000);
        
      } catch (error) {
        console.error('Form submission error:', error);
        alert('Error submitting form: ' + error.message);
      } finally {
        this.isSubmitting = false;
      }
    },

    resetForm() {
      this.initializeFormData();
      this.errors = {};
      this.submitSuccess = false;
    },

    // Public method to get form data
    getFormData() {
      return { ...this.formData };
    },

    // Public method to set form data
    setFormData(data) {
      Object.assign(this.formData, data);
    },

    // Public method to load schema from URL
    async loadSchemaFromUrl(url) {
      try {
        const response = await fetch(url);
        const schema = await response.json();
        this.schema = schema;
        this.schemaText = JSON.stringify(schema, null, 2);
        this.formTitle = schema.title || 'Dynamic Form';
        this.submitText = schema.submitText || 'Submit';
        this.initializeFormData();
      } catch (error) {
        console.error('Failed to load schema:', error);
      }
    }
  }
}
</script>
