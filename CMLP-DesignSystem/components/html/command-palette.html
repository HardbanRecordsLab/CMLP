<!-- Command Palette Component -->
<div x-data="commandPalette()" 
     x-init="init()"
     @keydown.window.meta.k.prevent="open()"
     @keydown.window.ctrl.k.prevent="open()"
     @keydown.window.escape="close()"
     class="command-palette"
     role="dialog"
     aria-label="Command Palette"
     aria-modal="true">
  
  <!-- Overlay -->
  <div x-show="isOpen" 
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       @click="close()"
       class="command-palette-overlay">
  </div>

  <!-- Container -->
  <div x-show="isOpen"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 scale-95"
       x-transition:enter-end="opacity-100 scale-100"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100 scale-100"
       x-transition:leave-end="opacity-0 scale-95"
       class="command-palette-container">
    
    <!-- Search Input -->
    <div class="flex items-center border-b border-base-300">
      <svg class="w-5 h-5 ml-4 text-base-content/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
      </svg>
      <input 
        type="text" 
        x-model="query"
        @input="search()"
        @keydown.down.prevent="selectNext()"
        @keydown.up.prevent="selectPrevious()"
        @keydown.enter.prevent="executeSelected()"
        placeholder="Type a command or search..."
        class="command-palette-input"
        x-ref="searchInput"
        autocomplete="off"
        aria-label="Search commands">
    </div>

    <!-- Results -->
    <div class="command-palette-results" x-ref="results">
      <template x-if="filteredCommands.length === 0 && query.length > 0">
        <div class="px-4 py-8 text-center text-base-content/40">
          <svg class="w-12 h-12 mx-auto mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <p>No results found</p>
        </div>
      </template>

      <template x-if="filteredCommands.length === 0 && query.length === 0">
        <div class="px-4 py-8 text-center text-base-content/40">
          <svg class="w-12 h-12 mx-auto mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <p>Start typing to search commands</p>
        </div>
      </template>

      <template x-for="(command, index) in filteredCommands" :key="command.id">
        <div 
          @click="execute(command)"
          @mouseenter="selectedIndex = index"
          :class="{ 'command-palette-item selected': selectedIndex === index }"
          class="command-palette-item"
          role="option"
          :aria-selected="selectedIndex === index">
          
          <!-- Icon -->
          <div class="command-palette-item-icon" x-html="command.icon"></div>
          
          <!-- Text -->
          <div class="command-palette-item-text">
            <div class="font-medium" x-text="command.name"></div>
            <div x-show="command.description" class="text-sm text-base-content/60" x-text="command.description"></div>
          </div>
          
          <!-- Shortcut -->
          <div x-show="command.shortcut" class="command-palette-item-shortcut" x-text="command.shortcut"></div>
        </div>
      </template>
    </div>

    <!-- Footer -->
    <div class="flex items-center justify-between px-4 py-2 border-t border-base-300 bg-base-200/50">
      <div class="flex items-center gap-4 text-xs text-base-content/40">
        <span class="flex items-center gap-1">
          <kbd class="kbd kbd-sm">↑</kbd>
          <kbd class="kbd kbd-sm">↓</kbd>
          <span>to navigate</span>
        </span>
        <span class="flex items-center gap-1">
          <kbd class="kbd kbd-sm">↵</kbd>
          <span>to select</span>
        </span>
        <span class="flex items-center gap-1">
          <kbd class="kbd kbd-sm">esc</kbd>
          <span>to close</span>
        </span>
      </div>
      <div class="text-xs text-base-content/40">
        <kbd class="kbd kbd-sm">⌘</kbd> + <kbd class="kbd kbd-sm">K</kbd>
      </div>
    </div>
  </div>
</div>

<script>
function commandPalette() {
  return {
    isOpen: false,
    query: '',
    commands: [],
    filteredCommands: [],
    selectedIndex: 0,
    fuse: null,

    init() {
      // Initialize Fuse.js for fuzzy search
      this.fuse = new Fuse(this.commands, {
        keys: ['name', 'description', 'keywords'],
        threshold: 0.3,
        includeScore: true
      });

      // Register default commands
      this.registerDefaultCommands();
    },

    registerDefaultCommands() {
      this.commands = [
        {
          id: 'navigate-home',
          name: 'Go to Home',
          description: 'Navigate to the home page',
          icon: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>',
          shortcut: 'G H',
          keywords: ['home', 'main', 'start'],
          action: () => window.location.href = '/'
        },
        {
          id: 'navigate-dashboard',
          name: 'Go to Dashboard',
          description: 'Navigate to the dashboard',
          icon: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>',
          shortcut: 'G D',
          keywords: ['dashboard', 'admin', 'panel'],
          action: () => window.location.href = '/dashboard'
        },
        {
          id: 'navigate-profile',
          name: 'Go to Profile',
          description: 'View your profile',
          icon: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>',
          shortcut: 'G P',
          keywords: ['profile', 'account', 'user'],
          action: () => window.location.href = '/profile'
        },
        {
          id: 'toggle-theme',
          name: 'Toggle Dark Mode',
          description: 'Switch between light and dark theme',
          icon: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>',
          shortcut: '⌘ ⇧ D',
          keywords: ['theme', 'dark', 'light', 'mode'],
          action: () => {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'cmlp-dark' ? 'cmlp-light' : 'cmlp-dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
          }
        },
        {
          id: 'search-docs',
          name: 'Search Documentation',
          description: 'Search through documentation',
          icon: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>',
          shortcut: '⌘ ⇧ S',
          keywords: ['docs', 'documentation', 'help'],
          action: () => window.location.href = '/docs'
        },
        {
          id: 'open-settings',
          name: 'Open Settings',
          description: 'Configure application settings',
          icon: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>',
          shortcut: '⌘ ,',
          keywords: ['settings', 'preferences', 'config'],
          action: () => window.location.href = '/settings'
        },
        {
          id: 'logout',
          name: 'Log Out',
          description: 'Sign out of your account',
          icon: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>',
          shortcut: '⌘ ⇧ Q',
          keywords: ['logout', 'signout', 'exit'],
          action: () => {
            if (confirm('Are you sure you want to log out?')) {
              window.location.href = '/logout';
            }
          }
        }
      ];

      // Update Fuse instance with new commands
      this.fuse = new Fuse(this.commands, {
        keys: ['name', 'description', 'keywords'],
        threshold: 0.3,
        includeScore: true
      });
    },

    open() {
      this.isOpen = true;
      this.query = '';
      this.filteredCommands = this.commands;
      this.selectedIndex = 0;
      
      // Focus input after animation
      setTimeout(() => {
        this.$refs.searchInput.focus();
      }, 100);
    },

    close() {
      this.isOpen = false;
      this.query = '';
    },

    search() {
      if (this.query.length === 0) {
        this.filteredCommands = this.commands;
      } else {
        const results = this.fuse.search(this.query);
        this.filteredCommands = results.map(result => result.item);
      }
      this.selectedIndex = 0;
    },

    selectNext() {
      if (this.selectedIndex < this.filteredCommands.length - 1) {
        this.selectedIndex++;
        this.scrollToSelected();
      }
    },

    selectPrevious() {
      if (this.selectedIndex > 0) {
        this.selectedIndex--;
        this.scrollToSelected();
      }
    },

    scrollToSelected() {
      const selectedElement = this.$refs.results.children[this.selectedIndex];
      if (selectedElement) {
        selectedElement.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
    },

    executeSelected() {
      if (this.filteredCommands.length > 0) {
        const command = this.filteredCommands[this.selectedIndex];
        this.execute(command);
      }
    },

    execute(command) {
      this.close();
      if (command.action) {
        command.action();
      }
    },

    // Public method to register custom commands
    registerCommand(command) {
      this.commands.push(command);
      this.fuse = new Fuse(this.commands, {
        keys: ['name', 'description', 'keywords'],
        threshold: 0.3,
        includeScore: true
      });
    }
  }
}
</script>
