# Redirect /cmlp/ on WordPress domain to the CMLP frontend
# Add this to the hardbanrecordslab.online server block in nginx

location = /cmlp/ {
    return 301 https://cmlp.hardbanrecordslab.online/;
}

# Optional: keep /cmlp path for backward compatibility
location ^~ /cmlp {
    return 301 https://cmlp.hardbanrecordslab.online$request_uri;
}