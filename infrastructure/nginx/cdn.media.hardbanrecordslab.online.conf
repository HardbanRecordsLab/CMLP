server {
    listen 80;
    server_name cdn.media.hardbanrecordslab.online;

    client_max_body_size 10M;

    # Proxy audio API to Express (for token validation)
    location /api/audio/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Internal endpoint for X-Accel-Redirect from Express
    location /protected_audio/ {
        internal;
        alias /opt/cmlp/media_files/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, immutable, no-transform";
        expires 30d;
        access_log off;
    }

    location /protected_hls/ {
        internal;
        alias /opt/cmlp/media_files/hls/;
        add_header Cache-Control "public, immutable, no-transform";
        expires 30d;
        access_log off;
    }

    # Health check
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    location / {
        return 404;
    }
}
