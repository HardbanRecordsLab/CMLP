# CMLP API - Nginx Configuration
# Hardban Records Lab - Production Ready

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

# Upstream configuration
upstream cmlp_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name api.cmlp.hardbanrecordslab.online;
    
    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.cmlp.hardbanrecordslab.online;
    
    # SSL Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/api.cmlp.hardbanrecordslab.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.cmlp.hardbanrecordslab.online/privkey.pem;
    
    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    
    # Logging
    access_log /var/log/nginx/cmlp-api-access.log;
    error_log /var/log/nginx/cmlp-api-error.log;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;
    
    # Client body size (for file uploads)
    client_max_body_size 100M;
    
    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    
    # Auth endpoints - strict rate limiting
    location /api/auth/ {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;
        
        proxy_pass http://cmlp_backend;
    }
    
    # Outlet login - strict rate limiting
    location /api/outlet/login {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;
        
        proxy_pass http://cmlp_backend;
    }
    
    # Health check - no rate limiting
    location /api/health {
        proxy_pass http://cmlp_backend;
        access_log off;
    }
    
    # WebSocket support
    location /ws {
        proxy_pass http://cmlp_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
    
    # Protected media files (X-Accel-Redirect)
    location /protected_media/ {
        internal;
        alias /opt/cmlp/media_files/;
        
        # Security: only allow requests from backend
        valid_referers none blocked server_names *.hardbanrecordslab.online;
        if ($invalid_referer) {
            return 403;
        }
    }
    
    # All API routes
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        
        proxy_pass http://cmlp_backend;
    }
    
    # Block sensitive paths
    location ~ /\.(env|git|gitignore) {
        deny all;
        return 404;
    }
    
    location ~* \.(sql|log|bak|backup)$ {
        deny all;
        return 404;
    }
    
    # Block common attack patterns
    location ~* (eval\(|base64,|phpinfo\() {
        deny all;
        return 403;
    }
    
    # Default location
    location / {
        proxy_pass http://cmlp_backend;
    }
}
