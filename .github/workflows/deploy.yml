name: CI/CD Pipeline — Build & Deploy to VPS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run type-check
      - run: npm run test
      - run: npm audit --audit-level=high

  deploy:
    needs: quality
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/cmlp

            # Stash any local changes
            git stash push --include-untracked --allow-empty 2>/dev/null || true

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Install all deps (including dev for Vite build)
            npm ci --ignore-scripts 2>/dev/null || npm install

            # Build server bundle FIRST (before vite clears dist/)
            mkdir -p dist
            npx esbuild server.ts --bundle --platform=node --format=cjs \
              --packages=external --sourcemap --outfile=dist/server.cjs

            # Build frontend SPA
            npx vite --config config/vite.config.ts build

            # Rebuild server bundle (vite build with emptyOutDir:true clears dist/)
            npx esbuild server.ts --bundle --platform=node --format=cjs \
              --packages=external --sourcemap --outfile=dist/server.cjs

            # Ensure logs dir exists
            mkdir -p /opt/cmlp/logs

            # Run DB migrations if schema changed
            SQL_HOST=localhost SQL_PORT=5433 SQL_USER=${{ secrets.DB_USER }} \
              SQL_PASSWORD=${{ secrets.DB_PASSWORD }} SQL_DB_NAME=${{ secrets.DB_NAME }} \
              npx drizzle-kit migrate --config config/drizzle.config.ts 2>/dev/null || true

            # Restart PM2
            pm2 delete hrl-licensing-platform 2>/dev/null || true
            pm2 start config/ecosystem.config.cjs --update-env

            # Health check
            sleep 5
            curl -sf http://127.0.0.1:3000/api/health || echo "Health check failed"
