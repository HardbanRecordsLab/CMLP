# =========================================================
# Phase 11 Production Deployment: GitHub Actions pipeline
# =========================================================

name: CI/CD Pipeline Build & Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Quality verification, compile checks, and tests runs
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Repository Code
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Application Dependencies
        run: npm ci

      - name: Code Syntax Check (Linter)
        run: npm run lint

      - name: Run Complete Operational Tests
        run: npm run test

  # Job 2: Multi-stage Docker image verification and artifact deployment compilation
  docker-build-and-push:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Check out Repository Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx Builder
        uses: docker/setup-buildx-action@v2

      - name: Authenticate on Secure Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/cmlp-core:latest
            ghcr.io/${{ github.repository }}/cmlp-core:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 3: Continuous Deployment step to target production VPS hosts
  deploy-to-production:
    needs: docker-build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Remote Deployment Hook / SSH Deployment Scripts
        run: |
          echo "[CD Deployment Triggered]"
          # Deployment workflow using SSH credentials:
          # SSH keys context: secrets.SSH_PRIVATE_KEY
          # SSH Host: secrets.SSH_HOST
          # Execution scripts:
          #   ssh -o StrictHostKeyChecking=no deploy@$SSH_HOST "cd /app && docker-compose pull && docker-compose up -d --remove-orphans"
